seed: 42
count: 2000
workers: 2

render:
  run:
    output_dir: dataset
    resolution: [1024, 1024]
    samples: 16
    qa_per_scene: 10

    camera_elevation: 0.5235987756
    camera_radius: [7.0, 9.0]
    camera_fov_degrees: 60.0

    placement_disk_radius: 3.0
    placement_padding: 0.15
    placement_attempts: 50
    regime_retries: 50

    depth_clip: 50.0

    regimes:
      - sparse
      - dense
      - depth_ambiguous
      - size_mixed
      - same_color_cluster
      - vertical
